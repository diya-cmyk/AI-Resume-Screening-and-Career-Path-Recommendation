<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Learning Roadmap — CareerLens</title>
  <link rel="stylesheet" href="../css/shared.css"/>
  <link rel="stylesheet" href="../css/pages.css"/>
</head>
<body>
  <div id="navbarPlaceholder"></div>
  <div class="page-container page-fade">
    <!-- Gate shown if no analysis data exists -->
    <div class="empty-gate" id="emptyGate" style="display:none">
      <div class="empty-icon-lg">◈</div>
      <h2>No role selected</h2>
      <p>Select a career role first to generate your personalized roadmap.</p>
      <a class="btn btn-accent" href="roles.html">Choose a Role</a>
    </div>

    <div id="mainContent"></div>
  </div>

  <script src="../js/shared.js"></script>

  <script type="module">
    import { auth } from "../js/firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

    // 1. AUTH PROTECTION & INITIALIZATION
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = 'login.html';
      } else {
        initNavbar('roadmap', user);

        // Handle Logout
        const logBtn = document.getElementById('logoutBtn');
        if (logBtn) logBtn.onclick = () => Auth.logout(auth);

        const d = AnalysisStore.get();
        let role = AnalysisStore.getSelectedRole();

        if (!d) {
          document.getElementById('emptyGate').style.display = 'flex';
          return;
        }

        // Fall back to first role if no selection but analysis exists
        if (!role && d.role_matches && d.role_matches.length > 0) {
          role = d.role_matches[0];
          AnalysisStore.setSelectedRole(role);
        }

        if (!role) {
          document.getElementById('emptyGate').style.display = 'flex';
        } else {
          render(d, role);
        }
      }
    });

    // 2. RENDER ROADMAP CONTENT
    function render(d, role) {
      const steps = d.learning_roadmap || [];
      const priorityConfig = {
        high:   { color: '#991b1b', bg: '#fef2f2', border: 'rgba(153,27,27,0.2)', label: 'High' },
        medium: { color: '#92400e', bg: '#fffbeb', border: 'rgba(146,64,14,0.2)', label: 'Medium' },
        low:    { color: '#2d6a4f', bg: '#e8f4ef', border: 'rgba(45,106,79,0.2)', label: 'Low' }
      };

      const completedSteps = JSON.parse(localStorage.getItem('cl_completed_steps') || '[]');

      document.getElementById('mainContent').innerHTML = `
        <div class="page-header">
          <div class="page-eyebrow">Step 04 — Learning Roadmap</div>
          <h1 class="page-title">Your path to <em>${role.title}</em></h1>
          <p class="page-sub">A week-by-week plan to close your skill gaps and land the role.</p>
        </div>

        <!-- Role context -->
        <div class="roadmap-context-bar">
          <div class="rc-left">
            <div class="rc-role">${role.title}</div>
            <div class="rc-salary">${role.salary_range || 'Competitive salary'}</div>
            <div class="badges-wrap" style="margin-top:8px">
              ${(role.missing_skills || []).map(s => `<span class="badge badge-red">Gap: ${s}</span>`).join('')}
            </div>
          </div>
          <div class="rc-right">
            ${scoreRingHTML(role.match_score, 72, 6, '#c8502a', 'match')}
          </div>
        </div>

        <!-- Progress Tracking -->
        <div class="card" style="margin-bottom:1.5rem">
          <div class="progress-header">
            <span class="card-section-title">Overall Progress</span>
            <span class="progress-count" id="progressCount">${completedSteps.length} / ${steps.length} completed</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progressFill" style="width:${steps.length ? Math.round(completedSteps.length/steps.length*100) : 0}%"></div>
          </div>
        </div>

        <!-- Timeline -->
        <div class="roadmap-timeline">
          ${steps.map((step, i) => {
            const p = priorityConfig[step.priority?.toLowerCase()] || priorityConfig.medium;
            const done = completedSteps.includes(i);
            return `
              <div class="rm-item ${done ? 'rm-done' : ''}" id="rmi-${i}">
                <div class="rm-connector"></div>
                <div class="rm-dot" style="background:${done ? p.color : p.bg};border-color:${p.color};color:${done ? '#fff' : p.color}">
                  ${done ? '✓' : (i+1)}
                </div>
                <div class="rm-body">
                  <div class="rm-meta">
                    <span class="rm-week">${(step.week || 'WEEK ' + (i+1)).toUpperCase()}</span>
                    <span class="priority-pill" style="background:${p.bg};color:${p.color};border:1px solid ${p.border}">${p.label} Priority</span>
                  </div>
                  <div class="rm-topic">${step.topic}</div>
                  <div class="rm-resources">
                    <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M2 6.5H11M6.5 2L11 6.5L6.5 11" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    Resources: ${step.resources || step.description || 'Self-study and online documentation'}
                  </div>
                  <button class="rm-check-btn" onclick="toggleStep(${i})" style="color:${p.color};border-color:${p.border}">
                    ${done ? '✓ Completed' : 'Mark complete'}
                  </button>
                </div>
              </div>`;
          }).join('')}
        </div>

        <!-- External Actions -->
        <div class="roadmap-actions">
          <a class="btn btn-outline" href="https://www.coursera.org/search?query=${encodeURIComponent(role.title)}" target="_blank">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7H12M12 7L8 3M12 7L8 11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Courses on Coursera
          </a>
          <a class="btn btn-outline" href="https://www.linkedin.com/jobs/search/?keywords=${encodeURIComponent(role.title)}" target="_blank">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7H12M12 7L8 3M12 7L8 11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Find ${role.title} Jobs
          </a>
          <button class="btn btn-outline" onclick="resetProgress()">Reset My Progress</button>
        </div>

        <div class="page-nav-row" style="margin-top:1.5rem">
          <a class="btn btn-outline" href="roles.html">← Back to Roles</a>
          <a class="btn btn-accent" href="analyze.html">Analyze Another Resume</a>
        </div>
      `;
    }

    // 3. INTERACTIVE FUNCTIONS (Attached to window for HTML button access)
    window.toggleStep = function(i) {
      let done = JSON.parse(localStorage.getItem('cl_completed_steps') || '[]');
      if (done.includes(i)) {
        done = done.filter(x => x !== i);
      } else {
        done.push(i);
      }
      localStorage.setItem('cl_completed_steps', JSON.stringify(done));
      
      // Refresh the UI
      const d = AnalysisStore.get();
      const role = AnalysisStore.getSelectedRole();
      render(d, role);
    };

    window.resetProgress = function() {
      if (confirm("Are you sure you want to reset your learning progress?")) {
        localStorage.removeItem('cl_completed_steps');
        const d = AnalysisStore.get();
        const role = AnalysisStore.getSelectedRole();
        render(d, role);
        showToast('Progress reset.', 'default');
      }
    };
  </script>
</body>
</html>
