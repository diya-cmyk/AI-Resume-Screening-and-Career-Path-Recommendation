<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Learning Roadmap — CareerLens</title>
  <link rel="stylesheet" href="../css/shared.css"/>
  <link rel="stylesheet" href="../css/pages.css"/>
</head>
<body>
  <div id="navbarPlaceholder"></div>
  <div class="page-container page-fade">
    <!-- Gate shown if no analysis data exists -->
    <div class="empty-gate" id="emptyGate" style="display:none">
      <div class="empty-icon-lg">◈</div>
      <h2>No role selected</h2>
      <p>Select a career role first to generate your personalized roadmap.</p>
      <a class="btn btn-accent" href="roles.html">Choose a Role</a>
    </div>

    <div id="mainContent"></div>
  </div>

  <script src="../js/shared.js"></script>

  <script type="module">
  // ✅ Removed Firebase imports and logic
  document.addEventListener('DOMContentLoaded', () => {
    // 1. Custom Auth Guard: Check for session
    const user = JSON.parse(localStorage.getItem('cl_user'));
    const token = localStorage.getItem('cl_token');

    if (!user || !token) {
      window.location.href = 'login.html';
      return;
    }

    // 2. Initialize Navbar
    initNavbar('roadmap', user);

    // 3. Setup Logout manually
    const logBtn = document.getElementById('logoutBtn');
    if (logBtn) {
      logBtn.onclick = () => {
        localStorage.removeItem('cl_user');
        localStorage.removeItem('cl_token');
        localStorage.removeItem('cl_analysis');
        localStorage.removeItem('cl_completed_steps');
        window.location.href = '../index.html';
      };
    }

    // 4. Load Analysis and Role Data
    const d = AnalysisStore.get();
    let role = AnalysisStore.getSelectedRole();

    if (!d) {
      document.getElementById('emptyGate').style.display = 'flex';
      return;
    }

    // Default to the first match if no role was explicitly selected
    if (!role && d.role_matches && d.role_matches.length > 0) {
      role = d.role_matches[0];
      AnalysisStore.setSelectedRole(role);
    }

    if (!role) {
      document.getElementById('emptyGate').style.display = 'flex';
    } else {
      render(d, role);
    }
  });

  function render(d, role) {
    const gaps = role.missing_skills || [];
    const steps = gaps.map((skill, i) => ({
      week: `WEEK 0${i + 1}`,
      topic: `Mastering ${skill}`,
      difficulty: i === 0 ? 'Intermediate' : 'Advanced',
      priority: 'High',
      impact: `+${Math.round(100 / (gaps.length + 1))}% Match`,
      description: `Mastering ${skill} is critical for ${role.title} roles. This week covers architecture and advanced usage.`,
      resources: `Docs, Tutorials, and Hands-on labs for ${skill}.`
    }));

    steps.push({
      week: `FINAL PHASE`,
      topic: `Portfolio Capstone Project`,
      difficulty: 'Expert',
      priority: 'High',
      impact: "Ready for Interview",
      description: `Apply your new knowledge of ${gaps.join(', ')} to build a production-grade application for your portfolio.`,
      resources: "Self-guided project with GitHub Deployment."
    });

    const priorityConfig = {
      high: { color: '#991b1b', bg: '#fef2f2', border: 'rgba(153,27,27,0.2)', label: 'High' },
      medium: { color: '#92400e', bg: '#fffbeb', border: 'rgba(146,64,14,0.2)', label: 'Medium' }
    };

    const completedSteps = JSON.parse(localStorage.getItem('cl_completed_steps') || '[]');
    const query = encodeURIComponent(role.title);

    document.getElementById('mainContent').innerHTML = `
        <div class="page-header">
          <div class="page-eyebrow">Step 04 — Learning Roadmap</div>
          <h1 class="page-title">Roadmap for <em>${d.name || 'Professional'}</em></h1>
          <p class="page-sub">Closing critical gaps to reach 100% match for <strong>${role.title}</strong>.</p>
        </div>

        <div class="roadmap-context-bar">
          <div class="rc-left">
            <div class="rc-role">${role.title}</div>
            <div class="badges-wrap" style="margin-top:8px">
              ${gaps.length > 0 
                ? gaps.map(s => `<span class="badge badge-red">Gap: ${s}</span>`).join('') 
                : '<span class="badge badge-green">Technical Ready</span>'}
            </div>
          </div>
          <div class="rc-right">
            ${scoreRingHTML(role.match_score || role.matchScore || 0, 72, 6, '#c8502a', 'match')}
          </div>
        </div>

        <div class="card" style="margin-bottom:1.5rem">
          <div class="progress-header">
            <span class="card-section-title">Certification Progress</span>
            <span class="progress-count">${completedSteps.length} / ${steps.length} Tasks</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width:${steps.length ? (completedSteps.length / steps.length * 100) : 0}%"></div>
          </div>
        </div>

        <div class="roadmap-timeline">
          ${steps.map((step, i) => {
            const p = priorityConfig[step.priority?.toLowerCase()] || priorityConfig.medium;
            const done = completedSteps.includes(i);
            return `
              <div class="rm-item ${done ? 'rm-done' : ''}">
                <div class="rm-connector"></div>
                <div class="rm-dot" style="background:${done ? p.color : '#fff'}; border-color:${p.color}; color:${done ? '#fff' : p.color}">
                  ${done ? '✓' : (i + 1)}
                </div>
                <div class="rm-body">
                  <div class="rm-meta">
                    <span class="rm-week">${step.week}</span>
                    <span class="badge" style="background:#eee; color:#444; font-size:10px">${step.difficulty.toUpperCase()}</span>
                    <span class="priority-pill" style="background:${p.bg};color:${p.color};border:1px solid ${p.border}">${step.impact}</span>
                  </div>
                  <div class="rm-topic">${step.topic}</div>
                  <p class="rm-desc" style="font-size: 0.9rem; color: #555; margin: 8px 0;">${step.description}</p>
                  <div class="rm-resources">
                    <strong>Resources:</strong> ${step.resources}
                  </div>
                  <button class="rm-check-btn" onclick="toggleStep(${i})" style="color:${p.color};border-color:${p.border}">
                    ${done ? '✓ Completed' : 'Mark as Finished'}
                  </button>
                </div>
              </div>`;
          }).join('')}
        </div>

        <div class="roadmap-actions">
          <a class="btn btn-outline" href="https://github.com/search?q=${query}+project" target="_blank">
            Search ${role.title} Projects
          </a>
          <a class="btn btn-outline" href="https://www.coursera.org/search?query=${query}" target="_blank">
            Courses on Coursera
          </a>
          <a class="btn btn-outline" href="https://www.linkedin.com/jobs/search/?keywords=${query}" target="_blank">
            LinkedIn Jobs
          </a>
          <button class="btn btn-outline" onclick="resetProgress()">Reset Roadmap</button>
        </div>

        <div class="page-nav-row" style="margin-top:1.5rem">
          <a class="btn btn-outline" href="roles.html">← Change Role</a>
          <a class="btn btn-accent" href="analyze.html">Analyze New Resume</a>
        </div>
      `;
  }

  window.toggleStep = function(i) {
    let done = JSON.parse(localStorage.getItem('cl_completed_steps') || '[]');
    if (done.includes(i)) done = done.filter(x => x !== i);
    else done.push(i);
    localStorage.setItem('cl_completed_steps', JSON.stringify(done));

    const d = AnalysisStore.get();
    const role = AnalysisStore.getSelectedRole();
    render(d, role);
  };

  window.resetProgress = function() {
    if (confirm("Reset your learning progress?")) {
      localStorage.removeItem('cl_completed_steps');
      const d = AnalysisStore.get();
      const role = AnalysisStore.getSelectedRole();
      render(d, role);
    }
  };
</script>
</body>
</html>
