<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — CareerLens</title>
  <link rel="stylesheet" href="../css/shared.css"/>
  <link rel="stylesheet" href="../css/auth.css"/>
</head>
<body class="auth-page">
  <div class="auth-wrap">
    <!-- LEFT PANEL -->
    <div class="auth-left">
      <a class="auth-logo" href="../index.html">
        <div class="nav-brand-dot"></div>CareerLens
      </a>
      <div class="auth-left-body">
        <h1 class="auth-left-title">Start your<br/><em>career journey.</em></h1>
        <p class="auth-left-sub">Get your first resume analysis in under a minute. Free, no credit card required.</p>
        <div class="benefit-list">
          <div class="benefit-item">
            <div class="benefit-check">✓</div>
            <span>AI-powered skill extraction</span>
          </div>
          <div class="benefit-item">
            <div class="benefit-check">✓</div>
            <span>3 matched career roles with fit scores</span>
          </div>
          <div class="benefit-item">
            <div class="benefit-check">✓</div>
            <span>Personalized learning roadmap</span>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL (FORM) -->
    <div class="auth-right">
      <div class="auth-form-wrap page-fade">
        <div class="auth-form-header">
          <h2 class="auth-form-title">Create your account</h2>
          <p class="auth-form-sub">Already have an account? <a href="login.html" class="auth-link">Sign in</a></p>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="firstName">First name</label>
            <input class="form-input" id="firstName" type="text" placeholder="Jane"/>
            <div class="error-msg" id="firstNameErr"></div>
          </div>
          <div class="form-group">
            <label class="form-label" for="lastName">Last name</label>
            <input class="form-input" id="lastName" type="text" placeholder="Smith"/>
            <div class="error-msg" id="lastNameErr"></div>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email address</label>
          <input class="form-input" id="email" type="email" placeholder="you@example.com"/>
          <div class="error-msg" id="emailErr"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="role">Current/target role</label>
          <select class="form-input" id="role">
            <option value="">Select a role...</option>
            <option>Software Engineer</option>
            <option>Frontend Developer</option>
            <option>Backend Developer</option>
            <option>Full Stack Developer</option>
            <option>Data Scientist</option>
            <option>UI/UX Designer</option>
            <option>Other</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <div class="input-pw-wrap">
            <input class="form-input" id="password" type="password" placeholder="At least 6 characters"/>
            <button class="pw-toggle" type="button" onclick="togglePw('password', this)">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8C2 8 4.5 3.5 8 3.5C11.5 3.5 14 8 14 8C14 8 11.5 12.5 8 12.5C4.5 12.5 2 8 2 8Z" stroke="currentColor" stroke-width="1.2"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.2"/></svg>
            </button>
          </div>
          <div class="error-msg" id="passwordErr"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="confirm">Confirm password</label>
          <div class="input-pw-wrap">
            <input class="form-input" id="confirm" type="password" placeholder="Repeat password"/>
            <button class="pw-toggle" type="button" onclick="togglePw('confirm', this)">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M2 8C2 8 4.5 3.5 8 3.5C11.5 3.5 14 8 14 8C14 8 11.5 12.5 8 12.5C4.5 12.5 2 8 2 8Z" stroke="currentColor" stroke-width="1.2"/><circle cx="8" cy="8" r="2" stroke="currentColor" stroke-width="1.2"/></svg>
            </button>
          </div>
          <div class="error-msg" id="confirmErr"></div>
        </div>

        <label class="form-check" style="margin-bottom:1.25rem">
          <input type="checkbox" id="agree"/>
          <span>I agree to the <a href="#" class="auth-link">Terms & Privacy Policy</a></span>
        </label>

        <button class="btn btn-accent btn-full" id="registerBtn" onclick="doRegister()">
          <span id="registerBtnText">Create Account</span>
        </button>

        <div class="auth-divider"><span>or sign up with</span></div>
        <div class="social-btns">
          <button class="social-btn" onclick="doGoogleLogin()">
            <svg width="16" height="16" viewBox="0 0 16 16"><path d="M15.5 8.2c0-.6-.1-1.2-.2-1.7H8v3.3h4.2c-.2 1-.8 1.8-1.6 2.4v2h2.6c1.5-1.4 2.3-3.4 2.3-6z" fill="#4285F4"/><path d="M8 16c2.2 0 4-.7 5.3-2l-2.6-2c-.7.5-1.6.8-2.7.8-2.1 0-3.8-1.4-4.4-3.3H1v2.1C2.3 14.2 5 16 8 16z" fill="#34A853"/><path d="M3.6 9.5C3.5 9.1 3.4 8.5 3.4 8c0-.5.1-1.1.2-1.5V4.4H1C.4 5.5 0 6.7 0 8c0 1.3.4 2.5 1 3.6l2.6-2.1z" fill="#FBBC05"/><path d="M8 3.2c1.2 0 2.2.4 3 1.2l2.2-2.2C11.8.8 10.1 0 8 0 5 0 2.3 1.8 1 4.4l2.6 2.1C4.2 4.6 5.9 3.2 8 3.2z" fill="#EA4335"/></svg>
            Google
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/shared.js"></script>
  
  <script type="module">
    import { auth, db } from "../js/firebase-config.js";
    import { createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";
    import { doc, setDoc } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'analyze.html';
    });

    window.doRegister = async function() {
      console.log("REGISTER BUTTON CLICKED");

      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const email = document.getElementById('email').value.trim();
      const role = document.getElementById('role').value;
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const agree = document.getElementById('agree').checked;

      if (!email || password.length < 6 || password !== confirm || !agree) {
        alert("Check all fields, password match (min 6 chars), and agree to terms.");
        return;
      }

      try {
        const res = await createUserWithEmailAndPassword(auth, email, password);
        
        // Save the profile info to the Database (Firestore)
        await setDoc(doc(db, "users", res.user.uid), {
          fullName: firstName + " " + lastName,
          email: email,
          role: role,
          createdAt: new Date()
        });

      } catch (error) {
        console.error(error);
        alert("Registration Error: " + error.message);
      }
    };

    window.doGoogleLogin = async function() {
      try {
        await signInWithPopup(auth, new GoogleAuthProvider());
      } catch (error) {
        alert(error.message);
      }
    };

    window.togglePw = (id, btn) => {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      btn.style.opacity = inp.type === 'text' ? '1' : '0.5';
    };
</script>
</body>
</html>
